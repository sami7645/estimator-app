# Render Blueprint: one Web Service (Django + frontend) + Postgres
# Deploy: connect repo in Render Dashboard, then use "New" -> "Blueprint" and select this file.
#
# IMPORTANT: PDF uploads and page images require persistent storage.
# - Free tier: files are LOST on redeploy/restart (ephemeral filesystem).
# - For persistent media: upgrade to plan: starter (or higher) and add the disk below.

databases:
  - name: estimator-db
    plan: free
    databaseName: estimator

services:
  - type: web
    name: estimator-app
    runtime: python
    plan: free  # Upgrade to 'starter' and uncomment disk below for persistent media
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    healthCheckPath: /api/health/
    # Persistent disk for PDFs/page images. Requires plan: starter. Uncomment when upgraded:
    # disk:
    #   name: media
    #   mountPath: /opt/render/project/src/media
    #   sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: estimator-db
          property: connectionString
      # When using persistent disk (plan: starter), add: MEDIA_ROOT=/opt/render/project/src/media
