# Render Blueprint: one Web Service (Django + frontend) + Postgres
# Deploy: connect repo in Render Dashboard, then use "New" -> "Blueprint" and select this file.

databases:
  - name: estimator-db
    plan: free
    databaseName: estimator

services:
  - type: web
    name: estimator-app
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: estimator-db
          property: connectionString
